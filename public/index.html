<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Personal notification & activity tracking — beauty, therapy, reminders." />
  <meta name="theme-color" content="#7C3AED" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MeinApp" />

  <title>MeinApp — Daily Routines</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./css/main.css" />

  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
</head>
<body>

  <div class="app-shell" id="app">

    <!-- Header -->
    <header class="app-header">
      <span class="app-header__title">MeinApp</span>
      <div id="header-actions"></div>
    </header>

    <!-- Main content — views are rendered here -->
    <main class="app-content" id="view-container">
      <div style="padding:2rem;text-align:center;color:#888;font-size:14px">Loading…</div>
    </main>

    <!-- Bottom navigation -->
    <nav class="app-nav" id="app-nav">
      <button class="app-nav__item" data-view="dashboard" aria-label="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Home
      </button>

      <button class="app-nav__item" data-view="routines" aria-label="Routines">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Routines
      </button>

      <button class="app-nav__item" data-view="calendar" aria-label="Calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Calendar
      </button>

      <button class="app-nav__item" data-view="history" aria-label="History">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        History
      </button>

      <button class="app-nav__item" data-view="settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </button>
    </nav>

    <!-- Toast notification container -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <!-- Modal overlay (JS-managed) -->
    <div id="modal-root"></div>

  </div><!-- /#app -->

  <!-- FAB — quick log -->
  <button class="fab" id="fab-quick-log" aria-label="Quick Log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Catch any JS errors and show them on screen for debugging -->
  <script>
    window.addEventListener('error', function(e) {
      var c = document.getElementById('view-container');
      if (c) c.innerHTML = '<div style="padding:1rem;color:red;font-size:13px;word-break:break-all"><b>JS Error:</b> ' + e.message + '<br><small>' + (e.filename||'') + ':' + e.lineno + '</small></div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      var c = document.getElementById('view-container');
      if (c) c.innerHTML = '<div style="padding:1rem;color:red;font-size:13px;word-break:break-all"><b>Promise Error:</b> ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)) + '</div>';
    });
  </script>

  <!-- Register Service Worker + Bootstrap app -->
  <script src="./js/bundle.min.js" defer></script>

</body>
</html>
